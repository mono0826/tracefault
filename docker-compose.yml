# version: "3.9"

services:
  # ── Neo4j 知识图谱数据库 ──────────────────────
  neo4j:
    image: neo4j:5.26.0
    container_name: agenthub-neo4j
    ports:
      - "7474:7474"   # Web UI
      - "7687:7687"   # Bolt
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  neo4j_data:
